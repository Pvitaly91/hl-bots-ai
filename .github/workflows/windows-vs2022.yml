name: Windows VS2022

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-vs2022:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: microsoft/setup-msbuild@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python requirements
        run: python -m pip install -r ai_director/requirements.txt
      - name: Build Release Win32 solution
        run: msbuild hl-bots-ai.sln /t:Build /p:Configuration=Release /p:Platform=Win32 /m /nologo
      - name: Run AI director unit tests
        run: python -m unittest ai_director.tests.test_decision
