# Deterministic HLDM test-stand template used by
# scripts/run_test_stand_with_bots.ps1 and scripts/run_server.ps1.
# The launcher copies this file to jk_botti_<map>.cfg before HLDS starts.
#
# Map: __MAP_NAME__
# Requested bot count: __BOT_COUNT__
# Requested bot skill: __BOT_SKILL__

pause 3

# Keep waypoint collection available for custom maps while making
# common lab behavior and bot population predictable.
autowaypoint 1
bot_add_level_tag 1
bot_conntimes 0
team_balancetype 1

bot_chat_percent 0
bot_taunt_percent 0
bot_whine_percent 0
bot_endgame_percent 0
bot_logo_percent 0
random_color 0
bot_shoot_breakables 2

__BOT_SETUP__

# AI balance bridge for the local HLDM lab. The Python sidecar reads
# addons/jk_botti/runtime/ai_balance/telemetry.json and writes back
# addons/jk_botti/runtime/ai_balance/patch.json. The plugin only applies
# slow, bounded adjustments to bot skill, bot count, pause frequency,
# and battle strafing.
jk_ai_balance_enabled 1
jk_ai_balance_interval 20
jk_ai_balance_cooldown 30
