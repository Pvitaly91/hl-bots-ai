# Public crossfire profile generated by
# scripts/run_public_crossfire_server.ps1.
#
# Map: __MAP_NAME__
# Public-mode default bot skill: __BOT_SKILL__
#
# Bot population is controlled by the public-mode runner:
# - no humans => runner sets min_bots/max_bots to the requested target
# - humans present => runner sets min_bots/max_bots to 0, kicks bots, and keeps them out
# - empty again => runner restores the target after a bounded delay

pause 3

autowaypoint 1
bot_add_level_tag 0
bot_conntimes 0
team_balancetype 1

bot_chat_percent 0
bot_taunt_percent 0
bot_whine_percent 0
bot_endgame_percent 0
bot_logo_percent 0
random_color 0
bot_shoot_breakables 2

# Start with a zero target. The runner raises or lowers the target at
# runtime through the authoritative public-server policy.
botskill __BOT_SKILL__
min_bots 0
max_bots 0

# Advanced AI balance remains optional and off by default for product
# minimum public mode. The runner may opt in later, but public startup
# must not depend on the Python sidecar.
jk_ai_balance_enabled __AI_BALANCE_ENABLED__
jk_ai_balance_interval 20
jk_ai_balance_cooldown 30
